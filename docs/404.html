<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Clinvio Nucleus</title>
    <link rel="stylesheet" href="css/clinvio-theme.css">
    <style>
        * { box-sizing: border-box; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'DM Sans', sans-serif; background: var(--cv-color-bg); color: var(--cv-color-text); }
        .container { text-align: center; max-width: 480px; padding: 2rem; }
        h1 { font-family: 'Sora', sans-serif; font-size: 6rem; font-weight: 800; color: var(--cv-color-primary-500); margin: 0; line-height: 1; }
        h2 { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        p { color: var(--cv-color-text-muted); margin: 0 0 2rem; }
        a { display: inline-block; padding: 0.75rem 2rem; background: var(--cv-color-primary-600); color: white; text-decoration: none; border-radius: var(--cv-radius-lg); font-weight: 600; transition: background 150ms; }
        a:hover { background: var(--cv-color-primary-700); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page not found</h2>
        <p>The page you're looking for doesn't exist in the Clinvio Nucleus documentation.</p>
        <a href="/nucleus/">Back to Documentation</a>
    </div>
</body>
</html>
