<div th:id="${id}"
     th:class="'cv-alert ' + ${type.cssClass} + ' ' + ${cssClass}"
     th:attr="data-cv-component='alert',
       role='alert',
       ${attributes}"
     th:if="${visible}">
  <span th:if="${icon}" th:class="'cv-alert-icon bi ' + ${icon}"></span>
  <div class="cv-alert-content">
    <div th:if="${message}" class="cv-alert-message" th:text="${message}"></div>
  </div>
  <button th:if="${dismissible}"
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"></button>
</div>
