<div th:id="${id}"
     th:class="'cv-sidebar d-flex flex-column flex-shrink-0 p-3 bg-light ' + (${collapsed} ? 'cv-sidebar-collapsed' : '') + ' ' + ${cssClass}"
     th:attr="data-cv-component='sidebar', ${attributes}"
     th:if="${visible}">
  <ul class="nav nav-pills flex-column mb-auto">
    <li th:each="item : ${items}" th:class="'nav-item' + (${item.active} ? ' active' : '') + (${item.subItems != null and !item.subItems.empty} ? ' has-submenu' : '')">
      <a class="nav-link" th:href="${item.url}" th:attr="
        aria-current=${item.active} ? 'page' : null,
        data-bs-toggle=${item.subItems != null and !item.subItems.empty} ? 'collapse' : null,
        data-bs-target=${item.subItems != null and !item.subItems.empty} ? '#' + ${id} + '-sub-' + ${itemStat.index} : null">
        <span th:if="${item.icon}" th:class="'bi ' + ${item.icon} + ' me-2'"></span>
        <span th:text="${item.label}">Item</span>
      </a>
      <ul th:if="${item.subItems != null and !item.subItems.empty}"
          th:id="${id} + '-sub-' + ${itemStat.index}"
          class="nav flex-column ms-3 collapse"
          th:classappend="${item.active} ? 'show' : ''">
        <li th:each="sub : ${item.subItems}" class="nav-item">
          <a class="nav-link" th:href="${sub.url}" th:text="${sub.label}"
             th:attr="aria-current=${sub.active} ? 'page' : null"></a>
        </li>
      </ul>
    </li>
  </ul>
</div>
