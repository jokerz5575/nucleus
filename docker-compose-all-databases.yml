version: '3.8'

# Complete Docker Compose for Clinvio Nucleus with all supported databases
# Usage: docker-compose -f docker-compose-all-databases.yml up

services:
  
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: clinvio-postgres
    environment:
      POSTGRES_DB: clinvio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL 8.3
  mysql:
    image: mysql:8.3-alpine
    container_name: clinvio-mysql
    environment:
      MYSQL_DATABASE: clinvio
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: clinvio_user
      MYSQL_PASSWORD: clinvio_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Oracle XE (requires significant resources)
  # Uncomment to enable - warning: large image, long startup
  # oracle:
  #   image: gvenzl/oracle-xe:21-alpine
  #   container_name: clinvio-oracle
  #   environment:
  #     ORACLE_PASSWORD: oracle
  #   ports:
  #     - "1521:1521"
  #   volumes:
  #     - oracle_data:/opt/oracle/oradata
  #   healthcheck:
  #     test: ["CMD", "/opt/oracle/healthcheck.sh"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # SQL Server 2022 (requires significant resources)
  # Uncomment to enable - warning: large image, requires 2GB+ memory
  # sqlserver:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   container_name: clinvio-sqlserver
  #   environment:
  #     SA_PASSWORD: Clinvio@2024!
  #     ACCEPT_EULA: Y
  #   ports:
  #     - "1433:1433"
  #   volumes:
  #     - sqlserver_data:/var/opt/mssql
  #   healthcheck:
  #     test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Clinvio@2024! -Q 'SELECT 1' || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Optional: pgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clinvio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # Optional: phpMyAdmin for MySQL management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: clinvio-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  postgres_data:
  mysql_data:
  # oracle_data:
  # sqlserver_data:

networks:
  default:
    name: clinvio-network
