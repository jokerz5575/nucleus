<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal(component)" 
     th:id="${component.id}" 
     class="cv-modal"
     th:classappend="${component.size != null ? 'cv-modal-' + component.size : ''}"
     style="display:none">
    <div class="cv-modal-backdrop" th:if="${component.backdrop}"></div>
    <div class="cv-modal-dialog">
        <div class="cv-modal-content">
            <div class="cv-modal-header" th:if="${component.title != null}">
                <h5 class="cv-modal-title" th:text="${component.title}">Title</h5>
                <button th:if="${component.closable}" type="button" class="cv-modal-close" onclick="this.closest('.cv-modal').style.display='none'">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="cv-modal-body">
                <span th:utext="${component.content}">Content</span>
            </div>
            <div class="cv-modal-footer" th:if="${component.confirmText != null or component.cancelText != null}">
                <button th:if="${component.cancelText != null}" type="button" class="btn btn-outline-secondary" onclick="this.closest('.cv-modal').style.display='none'" th:text="${component.cancelText}">Cancel</button>
                <button th:if="${component.confirmText != null}" type="button" class="btn btn-primary" th:attr="hx-post=${component.confirmAction}" th:text="${component.confirmText}">Confirm</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
