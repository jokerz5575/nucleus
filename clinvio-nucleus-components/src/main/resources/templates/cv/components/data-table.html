<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--/* Data Table Component Template */-->
<th:block th:fragment="dataTable(component)">
    <div th:id="${component.id}" class="cv-table-wrapper">
        <!-- Search Bar -->
        <div th:if="${component.searchable}" class="cv-table-search">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-search text-muted"></i>
                <input
                        type="text"
                        class="form-control"
                        placeholder="Search..."
                        th:value="${component.searchQuery}"
                        th:hx-get="${component.hxGet}"
                        th:hx-target="${component.hxTarget}"
                        hx-trigger="input changed delay:300ms, search"
                        name="search"
                />
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th
                            th:each="col : ${component.columns}"
                            th:text="${col.header}"
                            th:style="${col.width != null ? 'width:' + col.width : ''}"
                            th:styleappend="${col.align != null ? ';text-align:' + col.align : ''}"
                            th:class="${col.sortable ? 'cv-cursor-pointer' : ''}"
                            th:hx-get="${col.sortable ? component.hxGet : ''}"
                            th:hx-target="${col.sortable ? component.hxTarget : ''}"
                    >Header</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(component.data)}">
                    <td th:colspan="${#lists.size(component.columns)}" class="text-center cv-body-sm py-4">
                        <i class="bi bi-inbox text-muted me-2"></i>
                        <span th:text="${component.emptyMessage}">No data available</span>
                    </td>
                </tr>
                <tr th:each="row : ${component.data}">
                    <td
                            th:each="col : ${component.columns}"
                            th:text="${row[col.key]}"
                            th:style="${col.align != null ? 'text-align:' + col.align : ''}"
                    >Cell</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${component.pageable and component.totalPages > 1}" class="d-flex align-items-center justify-content-between p-3 border-top">
            <div class="cv-body-sm text-muted">
                Showing <span th:text="${component.currentPage * component.pageSize + 1}">1</span>
                to <span th:text="${#numbers.sequence(component.currentPage * component.pageSize + 1, T(java.lang.Math).min((component.currentPage + 1) * component.pageSize, component.totalItems))}">10</span>
                of <span th:text="${component.totalItems}">0</span> entries
            </div>
            <nav>
                <ul class="pagination mb-0">
                    <li th:class="'page-item' + (${component.hasPrevious} ? '' : ' disabled')">
                        <a class="page-link" href="#"
                           th:hx-get="${component.hxGet}"
                           th:hx-target="${component.hxTarget}"
                           th:attr="hx-vals='page:' + (${component.currentPage} - 1)"
                        >
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li
                            th:each="i : ${#numbers.sequence(0, component.totalPages - 1)}"
                            th:class="'page-item' + (${i == component.currentPage} ? ' active' : '')"
                    >
                        <a class="page-link" href="#"
                           th:text="${i + 1}"
                           th:hx-get="${component.hxGet}"
                           th:hx-target="${component.hxTarget}"
                           th:attr="hx-vals='page:' + ${i}"
                        >1</a>
                    </li>
                    <li th:class="'page-item' + (${component.hasNext} ? '' : ' disabled')">
                        <a class="page-link" href="#"
                           th:hx-get="${component.hxGet}"
                           th:hx-target="${component.hxTarget}"
                           th:attr="hx-vals='page:' + (${component.currentPage} + 1)"
                        >
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</th:block>
</body>
</html>
