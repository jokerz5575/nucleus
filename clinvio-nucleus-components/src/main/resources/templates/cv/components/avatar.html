<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="avatar(component)"
     th:id="${component.id}"
     th:class="'cv-avatar cv-avatar-' + ${component.size} + (${component.variant} != null ? ' cv-avatar-' + ${component.variant} : '')">
    <img th:if="${component.imageUrl != null}" th:src="${component.imageUrl}" th:alt="${component.name}">
    <span th:if="${component.imageUrl == null}" th:text="${component.initials}">AB</span>
</div>
</body>
</html>
