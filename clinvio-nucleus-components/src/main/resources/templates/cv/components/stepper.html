<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="stepper(component)" th:id="${component.id}" class="cv-stepper">
    <div th:each="step, iter : ${component.steps}" 
         th:class="'cv-stepper-step cv-stepper-' + ${step.status}">
        <div class="cv-stepper-indicator">
            <span th:if="${step.status == 'completed'}" class="cv-stepper-check"><i class="bi bi-check"></i></span>
            <span th:if="${step.status != 'completed'}" th:text="${iter.index + 1}">1</span>
        </div>
        <div class="cv-stepper-content">
            <div class="cv-stepper-title" th:text="${step.title}">Title</div>
            <div class="cv-stepper-description" th:text="${step.description}">Description</div>
        </div>
    </div>
</div>
</body>
</html>
