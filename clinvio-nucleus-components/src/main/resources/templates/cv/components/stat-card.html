<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--/* Stat Card Component Template */-->
<th:block th:fragment="statCard(component)">
    <div
            th:id="${component.id}"
            th:class="${'cv-stat-card ' + component.variant.cssClass + (component.cssClass != null ? ' ' + component.cssClass : '')}"
            th:hx-get="${component.hxGet}"
            th:hx-target="${component.hxTarget}"
    >
        <div class="d-flex align-items-center justify-content-between">
            <div>
                <div class="cv-stat-value" th:text="${component.value}">0</div>
                <div class="cv-stat-label" th:text="${component.label}">Label</div>
                <div
                        th:if="${component.delta != null}"
                        th:class="'cv-stat-delta ' + ${component.deltaType.cssClass}"
                >
                    <i th:class="'bi bi-' + (${component.deltaType == T(hu.clinvio.ui.components.basic.CvStatCard$DeltaType).POSITIVE} ? 'arrow-up' : (${component.deltaType == T(hu.clinvio.ui.components.basic.CvStatCard$DeltaType).NEGATIVE} ? 'arrow-down' : 'dash'))"></i>
                    <span th:text="${component.delta}"></span>
                </div>
            </div>
            <div th:if="${component.icon != null}" class="cv-avatar cv-avatar-lg cv-avatar-primary">
                <i th:class="'bi bi-' + ${component.icon}"></i>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
