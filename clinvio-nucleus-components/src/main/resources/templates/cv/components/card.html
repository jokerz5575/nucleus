<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--/* Card Component Template */-->
<th:block th:fragment="card(component)">
    <div
            th:id="${component.id}"
            th:class="${component.variant.cssClass + (component.cssClass != null ? ' ' + component.cssClass : '')}"
            th:hx-get="${component.hxGet}"
            th:hx-target="${component.hxTarget}"
    >
        <div th:if="${component.title != null or component.subtitle != null}" class="mb-3">
            <h5 th:if="${component.title != null}" class="cv-h5 mb-1" th:text="${component.title}">Title</h5>
            <p th:if="${component.subtitle != null}" class="cv-body-sm mb-0" th:text="${component.subtitle}"></p>
        </div>
        <div th:if="${component.body != null}" class="cv-body" th:utext="${component.body}"></div>
        <th:block th:if="${component.properties['content'] != null}" th:utext="${component.properties['content']}"></th:block>
        <div th:if="${!component.actions.isEmpty()}" class="d-flex gap-2 mt-3">
            <a
                    th:each="action : ${component.actions}"
                    th:href="${action.url}"
                    class="btn btn-outline-primary btn-sm"
                    th:text="${action.label}"
                    th:hx-target="${action.hxTarget}"
            >Action</a>
        </div>
        <div th:if="${component.footer != null}" class="mt-3 pt-3 border-top">
            <span th:utext="${component.footer}" class="cv-body-sm"></span>
        </div>
    </div>
</th:block>
</body>
</html>
